<header class="sticky top-0 z-[1050] h-[75px] bg-[#12355B] border-b border-white/15 flex items-center justify-between px-6 lg:px-8">

  <div class="flex items-center gap-3 shrink-0">
    <img src="petfinder-logo.svg" alt="PetFinder" class="h-14 w-auto brightness-0 invert" />
    <span class="hidden sm:inline-flex items-center px-2.5 py-1 rounded-md bg-[#E8842E] text-white text-xs font-bold">
      Administrador
    </span>
  </div>

  <div class="relative shrink-0">
    <button type="button" (click)="toggleMenu()" class="flex items-center gap-2.5 select-none text-white">
      <span class="w-9 h-9 rounded-full bg-cover bg-center shrink-0 ring-2 ring-white/25"
        [style.background-image]="'url(' + (fotoUsuario() || defaultAvatar) + ')'"></span>
      <span class="hidden sm:inline font-semibold capitalize">{{ nombreUsuario() }}</span>
      <svg class="w-4 h-4 text-white/70" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 9 6 6 6-6" />
      </svg>
    </button>

    @if (menuAbierto()) {
      <button type="button" (click)="cerrarMenu()" aria-label="Cerrar menú" class="fixed inset-0 z-[1050] cursor-default"></button>
      <div class="absolute right-0 top-[calc(100%+10px)] z-[1100] min-w-[200px] bg-white border border-slate-200 rounded-xl shadow-xl p-1.5 flex flex-col">
        <a href="/home" target="_blank" rel="noopener" (click)="cerrarMenu()"
          class="px-3 py-2.5 rounded-lg text-sm text-slate-700 hover:bg-slate-100 transition-colors">Ir a la app</a>
        <button type="button" (click)="logout()"
          class="text-left px-3 py-2.5 rounded-lg text-sm text-red-600 hover:bg-red-50 transition-colors">Cerrar sesión</button>
      </div>
    }
  </div>

</header>
