<header class="sticky top-0 z-[1050] h-[75px] bg-white border-b border-slate-200 flex items-center justify-between px-6 lg:px-8">

  <div class="flex items-center gap-3 shrink-0">
    <img src="nuevologo.png" alt="PetFinder" class="h-12 w-auto" />
    <span class="hidden sm:inline-flex items-center px-2.5 py-1 rounded-md bg-[#12355B] text-white text-xs font-bold">
      Administrador
    </span>
  </div>

  <div class="flex items-center gap-4 shrink-0">
    <div class="hidden sm:flex items-center gap-2.5 text-slate-700">
      <span class="w-9 h-9 rounded-full bg-[#12355B] text-white grid place-items-center font-bold shrink-0">A</span>
      <span class="font-semibold">Moderación</span>
    </div>

    <button type="button" (click)="logout()"
      class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-600 transition hover:bg-slate-50 hover:text-[#12355B]">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" x2="9" y1="12" y2="12" />
      </svg>
      Cerrar sesión
    </button>
  </div>

</header>
