<header class="navbar">

  <a class="logo" [routerLink]="[rutaHome]">
    <img src="nuevologo.png" alt="PetFinder" />
  </a>

  <nav>
    <a [routerLink]="[rutaHome]" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
    <a routerLink="/reportes" routerLinkActive="active">Reportes</a>
    <a routerLink="/chats" routerLinkActive="active">Chats</a>
    <a [routerLink]="[rutaMiPerfil]" routerLinkActive="active">Perfil</a>
  </nav>

  <div class="right-section">

    <button class="btn-nuevo" (click)="nuevoReporte()">
      + Nuevo reporte
    </button>

    <div class="usuario-menu">
      <button type="button" class="usuario-info" (click)="toggleMenu()">
        <div
          class="avatar"
          [style.background-image]="fotoUsuario() ? 'url(' + fotoUsuario() + ')' : null"
        ></div>
        <span class="usuario">{{ nombreUsuario() }}</span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m6 9 6 6 6-6" />
        </svg>
      </button>

      @if (menuAbierto()) {
        <button type="button" class="menu-backdrop" (click)="cerrarMenu()" aria-label="Cerrar menú"></button>
        <div class="dropdown">
          <a [routerLink]="[rutaMiPerfil]" class="dropdown-item" (click)="cerrarMenu()">Mi perfil</a>
          <button type="button" class="dropdown-item logout" (click)="cerrarSesion()">Cerrar sesión</button>
        </div>
      }
    </div>

  </div>

</header>
