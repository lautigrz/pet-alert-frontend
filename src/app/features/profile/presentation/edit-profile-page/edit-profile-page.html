<div class="min-h-screen bg-slate-50 flex flex-col">
  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <a routerLink="/" class="inline-flex items-center gap-2">
      <img src="petfinder-logo.svg" alt="PetFinder" class="h-14 w-auto" />
    </a>
  </header>
  <main class="flex-1 flex items-center justify-center px-6 py-10">
    <section class="w-full max-w-md">
      <h1 class="text-2xl font-bold text-[#12355B] mb-6 text-center">
        Editar perfil
      </h1>
      <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-7">
        <form
          [formGroup]="form"
          (ngSubmit)="submit()"
          novalidate
          class="flex flex-col gap-5"
        >
        <div class="flex flex-col items-center gap-3">
          <div class="relative">
            <img
            [src]="profilePhotoUrl()"
            alt="Foto de perfil"
            class="w-28 h-28 rounded-full object-cover border-4 border-slate-200 shadow-sm bg-slate-100"
            />

        <button
      type="button"
      (click)="photoInput.click()"
      [disabled]="uploadingPhoto()"
      class="absolute bottom-0 right-0 w-9 h-9 rounded-full bg-[#E8842E] hover:bg-[#d57821] disabled:bg-slate-300 disabled:cursor-not-allowed text-white flex items-center justify-center shadow-md border-2 border-white transition-colors"
      aria-label="Cambiar foto de perfil"
      >
      ✎
    </button>
  </div>

    <input
    #photoInput
    type="file"
    accept="image/jpeg,image/jpg,image/png,image/webp"
    class="hidden"
    (change)="onPhotoSelected($event)"
    />

    <button
    type="button"
    (click)="photoInput.click()"
    [disabled]="uploadingPhoto()"
    class="text-sm font-semibold text-[#1D6FA3] hover:text-[#12355B] disabled:text-slate-400"
    >
    {{ uploadingPhoto() ? 'Subiendo foto...' : 'Cambiar foto de perfil' }}
   </button>

    <p class="text-xs text-slate-500 text-center">
    JPG, PNG o WEBP. Máximo 5MB.
   </p>
  </div>
          <div>

            <label
              for="name"
              class="block text-sm font-semibold text-[#12355B] mb-1.5"
            >
              Nombre
            </label>
            <input
              id="name"
              type="text"
              formControlName="name"
              placeholder="Nombre"
              class="w-full px-4 py-3 border border-slate-300 rounded-md text-sm focus:outline-none focus:border-[#E8842E] focus:ring-1 focus:ring-[#E8842E]"
            />
          </div>
          <div>
            <label
              for="lastname"
              class="block text-sm font-semibold text-[#12355B] mb-1.5"
            >
              Apellido
            </label>
            <input
              id="lastname"
              type="text"
              formControlName="lastname"
              placeholder="Apellido"
              class="w-full px-4 py-3 border border-slate-300 rounded-md text-sm focus:outline-none focus:border-[#E8842E] focus:ring-1 focus:ring-[#E8842E]"
            />
          </div>
          <div>
            <label
              for="username"
              class="block text-sm font-semibold text-[#12355B] mb-1.5"
            >
              Usuario
            </label>
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Usuario"
              class="w-full px-4 py-3 border border-slate-300 rounded-md text-sm focus:outline-none focus:border-[#E8842E] focus:ring-1 focus:ring-[#E8842E]"
            />
            @if (hasError('username', 'minlength')) {
              <p class="text-xs text-red-600 mt-1">
                Mínimo 3 caracteres
              </p>
            }
            @if (hasError('username', 'maxlength')) {
              <p class="text-xs text-red-600 mt-1">
                Máximo 30 caracteres
              </p>
            }
          </div>

          @if (serverError()) {
            <div
              role="alert"
              class="bg-red-50 border-l-4 border-red-500 text-red-700 text-sm px-3 py-2 rounded"
            >
              {{ serverError() }}
            </div>
          }
          @if (successMessage()) {
            <div
              class="bg-emerald-50 border-l-4 border-emerald-500 text-emerald-700 text-sm px-3 py-2 rounded"
            >
              {{ successMessage() }}
            </div>
          }
          <button
            type="submit"
            [disabled]="submitting()"
            class="w-full bg-[#E8842E] hover:bg-[#d57821] disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-md transition-colors"
          >
            {{ submitting() ? 'Guardando...' : 'Guardar cambios' }}
          </button>
        </form>
      </div>
    </section>
  </main>
</div>
