<div class="bg-white border border-slate-200 rounded-2xl p-4 sm:p-5">
  <div class="flex items-center justify-between gap-2 mb-2">
    <h3 class="text-base font-bold text-[#12355B]">Última ubicación</h3>
    @if (esPropio()) {
      <button type="button" class="inline-flex items-center gap-1 text-sm font-semibold text-[#E8842E] hover:underline" (click)="editar.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z" />
        </svg>
        Editar
      </button>
    }
  </div>

  <p class="text-sm font-medium text-[#E8842E] leading-snug mb-3">
    {{ direccion() }}<br />
    {{ report().occurredAt | date: 'dd MMM yyyy, HH:mm' }}
  </p>

  <div class="relative rounded-xl overflow-hidden border border-slate-200 h-[200px]">
    <div id="report-review-map" class="w-full h-full"></div>
  </div>
</div>
