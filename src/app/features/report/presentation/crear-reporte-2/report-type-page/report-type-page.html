  <main class="flex-1 flex flex-col w-full max-w-6xl mx-auto px-4 sm:px-6 lg:px-10 py-6">
    <nav class="text-sm mb-3">
      <a routerLink="/home" class="text-[#1D6FA3] hover:underline">Inicio</a>
      <span class="text-slate-400"> &gt; </span>
      <span class="font-bold text-[#12355B]">Nuevo reporte</span>
    </nav>

    <div class="flex items-start justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-[#12355B]">¿Qué querés reportar?</h1>
        <p class="text-sm text-slate-500 mt-0.5">Seleccioná una opción</p>
      </div>
      <span class="shrink-0 bg-[#E8842E] text-white text-sm font-semibold px-4 py-2 rounded-md">
        Paso 1 de 5
      </span>
    </div>

    <app-wizard-stepper [current]="1" />

    <div class="flex flex-col gap-4 max-w-[500px] mx-auto w-full">
      <button
        type="button"
        (click)="select('lost')"
        class="flex items-center gap-5 text-left px-6 rounded-xl border-2 transition w-full min-h-[113px]"
        [class]="selectedType() === 'lost'
          ? 'bg-[#E8842E] border-[#E8842E]'
          : 'bg-white border-slate-200 hover:border-[#E8842E]'"
      >
        <span class="w-14 h-14 rounded-full bg-[#12355B] flex items-center justify-center shrink-0">
          <img src="Icono-mascota-perdida.png" alt="" class="w-7 h-7" />
        </span>
        <span>
          <span class="block text-lg font-bold" [class]="selectedType() === 'lost' ? 'text-white' : 'text-[#12355B]'">
            Mascota perdida
          </span>
          <span class="block text-sm" [class]="selectedType() === 'lost' ? 'text-white/90' : 'text-slate-500'">
            Mi mascota se perdió
          </span>
        </span>
      </button>

      <button
        type="button"
        (click)="select('found')"
        class="flex items-center gap-5 text-left px-6 rounded-xl border-2 transition w-full min-h-[113px]"
        [class]="selectedType() === 'found'
          ? 'bg-[#E8842E] border-[#E8842E]'
          : 'bg-white border-slate-200 hover:border-[#E8842E]'"
      >
        <span class="w-14 h-14 rounded-full bg-[#12355B] flex items-center justify-center shrink-0">
          <img src="Icono-mascota-encontrada.png" alt="" class="w-7 h-7" />
        </span>
        <span>
          <span class="block text-lg font-bold" [class]="selectedType() === 'found' ? 'text-white' : 'text-[#12355B]'">
            Mascota encontrada
          </span>
          <span class="block text-sm" [class]="selectedType() === 'found' ? 'text-white/90' : 'text-slate-500'">
            Encontré una mascota
          </span>
        </span>
      </button>
    </div>

    <div class="flex items-center justify-between mt-auto pt-8">
      <button type="button" (click)="cancel()" class="text-slate-500 hover:text-[#12355B] font-medium">
        Cancelar
      </button>
      <button
        type="button"
        (click)="next()"
        [disabled]="!selectedType()"
        class="bg-[#12355B] hover:bg-[#0e2a4a] disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold px-8 py-2.5 rounded-md transition"
      >
        Siguiente
      </button>
    </div>
  </main>
