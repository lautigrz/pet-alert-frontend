<div class="confirm-page-container">

  @if (isLoading()) {
    <div class="loading-state">
      <div class="spinner"></div>
      <h2>Enviando tu reporte...</h2>
      <p>Por favor esperá mientras guardamos tu información</p>
    </div>

 } @else if (reportId()) {
  <div class="success-overlay">
    <div class="success-card">
      <button class="close-btn" (click)="goHome()">✕</button>

      <div class="success-icon">
        <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="26" fill="#1e3a8a"/>
          <path d="M14 26l9 9 15-18" stroke="white" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h2>Reporte creado con éxito</h2>
      <p>La alerta ya está activa y la comunidad fue notificada.</p>

      <button class="btn-ver-reporte" (click)="goHome()">Ver reporte</button>
    </div>
  </div>

  } @else if (error()) {
    <div class="error-state">
      <h2>⚠️ Error al enviar</h2>
      <p>{{ error() }}</p>
      <button class="btn primary" (click)="submitReport()">Reintentar</button>
    </div>
  }

</div>
