  <main class="flex-1 flex flex-col w-full max-w-6xl mx-auto px-10 py-6">
    <nav class="text-sm mb-3">
      <a routerLink="/home" class="text-[#1D6FA3] hover:underline">Inicio</a>
      <span class="text-slate-400"> &gt; </span>
      <span class="font-bold text-[#12355B]">Nuevo reporte</span>
    </nav>

    <div class="flex items-start justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-[#12355B]">¿Qué tipo de reporte?</h1>
        <p class="text-sm text-slate-500 mt-0.5">Seleccioná una opción</p>
      </div>
      <span class="shrink-0 bg-[#E8842E] text-white text-sm font-semibold px-4 py-2 rounded-md">
        Paso 1 de 5
      </span>
    </div>

    <app-wizard-stepper [current]="1" />

    <div class="flex flex-col gap-4 max-w-[500px] mx-auto w-full">
      <button
        type="button"
        (click)="select('sighting')"
        class="flex items-center gap-5 text-left px-6 rounded-xl border-2 transition w-full min-h-[113px]"
        [class]="selectedType() === 'sighting'
          ? 'bg-[#E8842E] border-[#E8842E]'
          : 'bg-white border-slate-200 hover:border-[#E8842E]'"
      >
        <span class="w-14 h-14 rounded-full bg-[#12355B] flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </span>
        <span>
          <span class="block text-lg font-bold" [class]="selectedType() === 'sighting' ? 'text-white' : 'text-[#12355B]'">
            Avistamiento
          </span>
          <span class="block text-sm" [class]="selectedType() === 'sighting' ? 'text-white/90' : 'text-slate-500'">
            Vi una mascota pero no la tengo conmigo
          </span>
        </span>
      </button>

      <button
        type="button"
        (click)="select('transit')"
        class="flex items-center gap-5 text-left px-6 rounded-xl border-2 transition w-full min-h-[113px]"
        [class]="selectedType() === 'transit'
          ? 'bg-[#E8842E] border-[#E8842E]'
          : 'bg-white border-slate-200 hover:border-[#E8842E]'"
      >
        <span class="w-14 h-14 rounded-full bg-[#12355B] flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
            <path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          </svg>
        </span>
        <span>
          <span class="block text-lg font-bold" [class]="selectedType() === 'transit' ? 'text-white' : 'text-[#12355B]'">
            Tránsito
          </span>
          <span class="block text-sm" [class]="selectedType() === 'transit' ? 'text-white/90' : 'text-slate-500'">
            La encontré y la tengo conmigo
          </span>
        </span>
      </button>
    </div>

    <div class="flex items-center justify-between mt-auto pt-8">
      <button type="button" (click)="back()" class="text-slate-500 hover:text-[#12355B] font-medium">
        Volver
      </button>
      <button
        type="button"
        (click)="next()"
        [disabled]="!selectedType()"
        class="bg-[#12355B] hover:bg-[#0e2a4a] disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold px-8 py-2.5 rounded-md transition"
      >
        Siguiente
      </button>
    </div>
  </main>
