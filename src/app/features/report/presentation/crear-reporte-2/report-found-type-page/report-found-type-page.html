<div class="type-page-container">
  <div class="breadcrumb">
    <span>Inicio</span>
    <span> > </span>
    <span>Nuevo reporte</span>
  </div>

  <div class="header-section">
    <h1>¿Qué tipo de reporte?</h1>
    <p class="subtitle">Selecciona una opción</p>
  </div>

  <div class="progress-indicator">
    <div class="step active">
      <span class="number">1</span>
      <span class="label">Tipo</span>
    </div>
    <div class="step">
      <span class="number">2</span>
      <span class="label">Datos</span>
    </div>
    <div class="step">
      <span class="number">3</span>
      <span class="label">Ubicado</span>
    </div>
    <div class="step">
      <span class="number">4</span>
      <span class="label">Detalles</span>
    </div>
    <div class="step">
      <span class="number">5</span>
      <span class="label">Listo</span>
    </div>
  </div>

  <div class="options-container">
    <button class="option-card dark" (click)="selectSighting()">
      <div class="icon">👀</div>
      <h2>Avistamiento</h2>
      <p>Vi una mascota</p>
    </button>

    <button class="option-card orange" (click)="selectTransit()">
      <div class="icon">❤️</div>
      <h2>Tránsito</h2>
      <p>Mascota en tránsito</p>
    </button>
  </div>

  <div class="action-buttons">
    <button class="btn-cancel" (click)="cancel()">Cancelar</button>
    <button class="btn-next" disabled>Siguiente</button>
  </div>
</div>
