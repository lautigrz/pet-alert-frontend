<app-navbar></app-navbar>

<main>
  <div id="map"></div>

  @if (successReportId()) {
    <div class="fixed left-0 right-0 bottom-0 top-16 z-[2000] flex items-center justify-center px-4 bg-black/10">
      <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-md p-8 text-center">
        <button type="button" (click)="closeSuccess()" aria-label="Cerrar"
          class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18" /><path d="m6 6 12 12" />
          </svg>
        </button>

        <div class="w-16 h-16 mx-auto rounded-full bg-[#12355B] flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>

        <h2 class="text-xl font-bold text-[#E8842E] mb-1.5">Reporte creado con éxito</h2>
        <p class="text-sm text-slate-500 mb-6">La alerta ya está activa y la comunidad fue notificada.</p>

        <button type="button" (click)="verReporte()"
          class="w-full bg-[#12355B] hover:bg-[#0e2a4a] text-white font-semibold py-3 rounded-md transition">
          Ver reporte
        </button>
      </div>
    </div>
  }
</main>
