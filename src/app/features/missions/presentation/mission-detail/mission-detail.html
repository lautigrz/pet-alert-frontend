@if (mission(); as m) {

<div class="min-h-screen bg-slate-100 py-8">

  <div class="max-w-3xl mx-auto">

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

      
      <img
        [src]="
          m.report.lost_report_detail?.pet?.petImages?.[0]?.photoUrl ??
          m.report.reportImages?.[0]?.photoUrl ??
          'assets/default-pet.png'
        "
        class="w-full h-72 object-cover"
      >

   
      <div class="p-8">

        <span
          class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#2563eb] text-white text-sm font-bold">

          🎯 Misión

        </span>

        <h1 class="mt-5 text-3xl font-bold text-[#12355B]">

          {{ m.title }}

        </h1>

        <p class="mt-4 text-slate-600 leading-7 whitespace-pre-line">

          {{ m.description }}

        </p>

        <div class="mt-6 flex items-center gap-2 text-slate-500">

          📍

          <span>

            {{ m.report.location_address }}

          </span>

        </div>

        <div class="mt-3 text-slate-600">

          Radio:
          <b>{{ m.radius }} m</b>

        </div>

        <hr class="my-8">

        <h2 class="text-xl font-bold text-[#12355B]">

          ¿Cómo te fue?

        </h2>

        <p class="text-sm text-slate-500 mt-1">

          Contale al dueño qué revisaste y adjuntá una foto como evidencia.

        </p>

     

        <textarea
  rows="5"
  [(ngModel)]="comentario"
  placeholder="Escribí un comentario..."
  class="mt-4 w-full rounded-xl border border-slate-300 p-4 outline-none focus:border-[#2563eb]">
</textarea>


        <div class="mt-6">

          <label class="block text-sm font-semibold mb-2">

            📷 Subir evidencia

          </label>
                  </div>


           <button
          type="button"
          (click)="enviarMision()"
          class="mt-8 w-full bg-[#12355B] hover:bg-[#0f2d4d] text-white font-bold py-4 rounded-xl transition">

          Enviar misión

        </button>
        

      </div>

    </div>

  </div>

</div>

}
