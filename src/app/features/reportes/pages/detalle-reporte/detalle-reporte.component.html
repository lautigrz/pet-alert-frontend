<div class="detalle-container">

  @if (loading()) {
    <p>Cargando...</p>
  } @else if (error()) {
    <p>{{ error() }}</p>
  } @else if (report(); as r) {

    <div class="left-section">
      <app-galeria-reporte [report]="r" />
      <app-info-reporte [report]="r" />
    </div>

    <div class="right-section">
      <app-ubicacion-reporte [report]="r" />
      <app-contacto-reporte [report]="r" />
    </div>

  }

</div>
