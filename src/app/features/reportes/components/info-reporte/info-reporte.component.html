<div class="info-card">
  <span class="estado">
    {{ estado() }}
  </span>

  <h1>{{ titulo() }}</h1>

  <p class="datos">
    {{ datos() }}
  </p>

  <div class="tags">
    <span>{{ collar() }}</span>
    @if (transito()) {
      <span>{{ transito() }}</span>
    }
  </div>

  <h3>Descripcion</h3>

  <p class="descripcion">
    {{ descripcion() }}
  </p>

  <div class="extra-info">
    <span>{{ ubicacion() }}</span>
    <span>{{ report().occurredAt | date: 'dd MMM yyyy' }}</span>
    <span>{{ report().occurredAt | date: 'HH:mm' }}</span>
  </div>
</div>
