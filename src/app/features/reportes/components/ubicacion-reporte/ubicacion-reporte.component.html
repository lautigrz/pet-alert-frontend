<div class="ubicacion-card">
  <h3>Ultima ubicacion</h3>

  <p>
    {{ direccion() }}
  </p>

  <div class="mapa-container">
    <img class="mapa-img" src="mapa.avif" alt="Mapa" />

    @if (imagenMascota()) {
      <div class="pin-mascota">
        <img [src]="imagenMascota()!" alt="Mascota" />
      </div>
    }
  </div>
</div>
