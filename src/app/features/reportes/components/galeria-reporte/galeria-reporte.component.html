<div class="galeria-container">

  @if (imagenPrincipal()) {
  <div class="imagen-principal-wrap" role="button" tabindex="0" (click)="abrirImagen(imagenPrincipal()!)"
    (keyup.enter)="abrirImagen(imagenPrincipal()!)">
    <img [src]="imagenPrincipal()" alt="Foto principal de la mascota" />
  </div>
  }

  <div class="miniaturas">
    @for (url of imagenes(); track url; let i = $index) {
    <div class="miniatura-wrap" [class.activa]="url === imagenPrincipal()" role="button" tabindex="0"
      (click)="seleccionarImagen(url)" (keyup.enter)="seleccionarImagen(url)">
      <img [src]="url" [alt]="'Foto ' + (i + 1)" />
    </div>
    }
  </div>

</div>

@if (imagenSeleccionada()) {
<div class="modal-overlay" role="dialog" aria-modal="true" (click)="cerrarImagen()" (keyup.escape)="cerrarImagen()">
  <div class="modal-inner">
    <button type="button" class="modal-close" aria-label="Cerrar imagen" (click)="cerrarImagen()">
      &times;
    </button>
    <img [src]="imagenSeleccionada()" alt="Imagen ampliada" tabindex="0" (click)="$event.stopPropagation()"
      (keyup.enter)="$event.stopPropagation()" />
  </div>
</div>
}
