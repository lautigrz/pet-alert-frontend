<div class="galeria-container">

  @if (imagenPrincipal()) {
    <img
      class="imagen-principal"
      [src]="imagenPrincipal()"
      role="button"
      tabindex="0"
      (click)="abrirImagen(imagenPrincipal()!)"
      (keyup.enter)="abrirImagen(imagenPrincipal()!)"
      alt="Imagen principal"
    />
  }

  <div class="miniaturas">
    @for (url of imagenes(); track url) {
      <img
        [src]="url"
        role="button"
        tabindex="0"
        (click)="abrirImagen(url)"
        (keyup.enter)="abrirImagen(url)"
        alt="Miniatura"
      />
    }
  </div>

</div>

@if (imagenSeleccionada()) {
  <div
    class="modal-overlay"
    role="button"
    tabindex="0"
    (click)="cerrarImagen()"
    (keyup.enter)="cerrarImagen()"
  >
    <button type="button" class="close-btn" (click)="cerrarImagen()">&times;</button>
  <img
    [src]="imagenSeleccionada()"
    class="imagen-completa"
    alt="Imagen completa"
    role="button"
    tabindex="0"
    (click)="$event.stopPropagation()"
    (keyup.enter)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
  />
  </div>
}
