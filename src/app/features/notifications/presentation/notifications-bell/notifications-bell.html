<div class="relative" [class.flex-1]="variante === 'bottom'">

  <button type="button" (click)="alternar()" aria-label="Notificaciones" [class]="disparadorClase()">
    <span class="relative">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.268 21a2 2 0 0 0 3.464 0" />
        <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8a6 6 0 0 0-12 0c0 4.499-1.411 5.956-2.738 7.326" />
      </svg>
      @if (noVistas() > 0) {
        <span class="absolute -top-1.5 -right-1.5 min-w-[18px] h-[18px] px-1 bg-[#E8842E] text-white text-[10px] font-bold rounded-full flex items-center justify-center">
          {{ badge() }}
        </span>
      }
    </span>
    @if (variante === 'bottom') {
      <span class="whitespace-nowrap">Avisos</span>
    }
  </button>

  @if (abierto()) {
    <button type="button" (click)="cerrar()" aria-label="Cerrar notificaciones" class="fixed inset-0 z-[1050] cursor-default"></button>

    <div [class]="panelClase()">
      <div class="px-4 py-3 border-b border-slate-200">
        <span class="font-semibold text-[#12355B]">Coincidencias</span>
      </div>

      @if (notificaciones().length === 0) {
        <p class="px-4 py-6 text-sm text-slate-400 text-center">No tenés coincidencias todavía.</p>
      } @else {
        @for (n of notificaciones(); track n.matchPublicId) {
          <button type="button" (click)="goToMatches(n)"
            class="flex items-center gap-3 px-4 py-3 text-left border-b border-slate-100 last:border-b-0 hover:bg-slate-50 transition-colors w-full"
            [class.bg-orange-50]="!n.vista">

            <span class="relative shrink-0">
              @if (imagenDe(n)) {
                <img [src]="imagenDe(n)" alt="" class="w-12 h-12 rounded-lg object-cover bg-slate-100" />
              } @else {
                <span class="w-12 h-12 rounded-lg bg-slate-100 flex items-center justify-center text-slate-300">
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                    <circle cx="9" cy="9" r="2" />
                    <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                  </svg>
                </span>
              }
              @if (!n.vista) {
                <span class="absolute -top-1 -right-1 w-3 h-3 bg-[#E8842E] border-2 border-white rounded-full"></span>
              }
            </span>

            <span class="flex-1 min-w-0">
              <span class="block text-sm font-semibold text-slate-700 truncate">
                {{ tituloDe(n) }}
              </span>
              <span class="block text-xs font-medium text-[#1D6FA3]">{{ porcentaje(n.score) }} de coincidencia</span>
              <span class="block text-xs text-slate-400">{{ n.createdAt | date: 'dd/MM/yyyy HH:mm' }}</span>
            </span>
          </button>
        }
      }
    </div>
  }

</div>
