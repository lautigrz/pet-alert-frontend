@if (visible()) {
  <div class="mb-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="flex items-start gap-3">
      <div class="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-[#E8842E]/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#E8842E]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.268 21a2 2 0 0 0 3.464 0" />
          <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
        </svg>
      </div>
      <div class="min-w-0">
        <h3 class="text-sm font-extrabold text-[#12355B]">Activá las notificaciones</h3>
        <p class="mt-0.5 text-[13px] text-slate-500">Enterate al toque de coincidencias y avistamientos cerca.</p>
      </div>
    </div>
    <div class="mt-3 flex items-center gap-2">
      <button
        type="button"
        (click)="activate()"
        [disabled]="busy()"
        class="flex-1 rounded-lg bg-[#E8842E] px-4 py-2 text-sm font-bold text-white transition hover:bg-[#d6761f] disabled:opacity-60"
      >
        {{ busy() ? 'Activando…' : 'Activar' }}
      </button>
      <button
        type="button"
        (click)="dismiss()"
        class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-500 transition hover:text-[#12355B]"
      >
        Ahora no
      </button>
    </div>
  </div>
}
